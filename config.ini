[logging]
# Directory where daily CSV log files are stored
log_dir = logs
# Sensor reading and logging interval in seconds (300 = 5 minutes)
interval_seconds = 300

[display]
# Hour of day (0-23) when the OLED screen turns on
daylight_start = 8
# Hour of day (0-23) when the OLED screen turns off
daylight_end = 22
# What to show on the OLED screen: temp_hum | iaq | cycle
# cycle alternates between temperature/humidity and IAQ every minute
display_mode = cycle

[web]
host = 0.0.0.0
port = 8080
